name: Check nginx.conf is in sync with router.js

on:
  push:
    branches: [main]
    paths:
      - 'src/router.js'
      - 'nginx.conf'
      - 'scripts/generate-nginx-config.js'
      - 'package.json'
      - '.github/workflows/nginx-sync.yaml'
  pull_request:
    paths:
      - 'src/router.js'
      - 'nginx.conf'
      - 'scripts/generate-nginx-config.js'
      - 'package.json'
      - '.github/workflows/nginx-sync.yaml'

jobs:
  nginx-sync:
    runs-on: ubuntu-latest
    name: Check nginx.conf sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Verify nginx.conf is in sync with src/router.js
        run: npm run nginx:check
